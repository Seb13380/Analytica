services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -lc "chown -R www-data:www-data storage bootstrap/cache || true; php-fpm"
    volumes:
      - ./:/var/www/html
      - analytica_storage:/var/www/html/storage
      - analytica_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
    depends_on:
      - postgres
      - redis
      - minio

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -lc "chown -R www-data:www-data storage bootstrap/cache || true; php artisan queue:work --sleep=1 --tries=3 --timeout=900"
    volumes:
      - ./:/var/www/html
      - analytica_storage:/var/www/html/storage
      - analytica_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
    depends_on:
      - app
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytica
      POSTGRES_USER: analytica
      POSTGRES_PASSWORD: analytica
    ports:
      - "5432:5432"
    volumes:
      - analytica_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - analytica_minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "
      until mc alias set analytica http://minio:9000 minio minio123456; do sleep 1; done;
      mc mb --ignore-existing analytica/analytica;
      mc anonymous set none analytica/analytica;
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"
      - "1026:1025"

  ocr:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    ports:
      - "8000:8000"

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  analytica_pgdata:
  analytica_minio:
  analytica_storage:
  analytica_bootstrap_cache:
